name: Example Usage of Setup Development Environment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-action:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup development environment
      uses: ./
      id: setup
      
    - name: Verify installations
      run: |
        echo "Go version: $(go version)"
        echo "Java version: $(java -version 2>&1 | head -n 1)"
        echo "Skaffold version: $(skaffold version --output=json 2>/dev/null | jq -r '.version // "unknown"' || echo "skaffold installed")"
        echo "Kustomize version: $(kustomize version --short)"
        echo "Helm version: $(helm version --short)"
        echo "Protoc version: $(protoc --version)"
        
        # Test Go tools
        echo "Testing Go tools..."
        which go-test-coverage
        which oapi-codegen  
        which protoc-gen-go
        which lichen
        
    - name: Test Go module operations
      run: |
        # Create a simple Go module to test the setup
        mkdir -p test-project
        cd test-project
        go mod init test
        echo 'package main; import "fmt"; func main() { fmt.Println("Hello, World!") }' > main.go
        go run main.go
        
  test-with-custom-versions:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup development environment with custom versions
      uses: ./
      with:
        go-version: '1.23.0'
        helm-version: 'v3.13.0'
        
    - name: Verify custom versions
      run: |
        echo "Go version: $(go version)"
        echo "Helm version: $(helm version --short)"